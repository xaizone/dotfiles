; === [ COLORS ] ===
[color]
       background = ${xrdb:color0:#111}
       background-alt = ${xrdb:color1:#333}
       foreground = ${xrdb:color7:#eee}
       primary = ${xrdb:color2:#06b}

; === [ BARS ] ===

[bar/main]
        width = 100%
        height = 24pt

        padding-right = 2

        line-size = 2pt

        background = ${color.background}
        foreground = ${color.foreground}

        font-0 = DejaVu Sans:size=10;1

        modules-left = workspace
        modules-center = xwindow
        modules-right = cpu ram volume date time

        fixed-center = true

        scroll-up = "#i3.prev"
        scroll-down = "#i3.next"

        separator = |
        module-margin = 2

        cursor-click = pointer

; === [ MODULES ] === 

[module/xwindow]
        type = internal/xwindow
        format = <label>
        label = %title:0:50:%

[module/date]
        type = internal/date
        date = %Y-%m-%d%
        label = %date%

[module/time]
        type = internal/date
        interval = 1
        time = %H:%M:%S
        label = %time%

[module/volume]
        type = internal/pulseaudio
        interval = 5
        format = <label-volume>
        label-volume = vol: %percentage%%
        label-muted = muted
        click-right = pavucontrol

[module/cpu]
        type = internal/cpu
        interval = 0.5
        format = <label>
        label = cpu: %percentage%%

[module/ram]
        type = internal/memory
        interval = 5
        format = <label>
        label = ram: %percentage_used%%

[module/workspace]
        type = internal/xworkspaces

        label-active = %name%
        label-active-background = ${color.background-alt}
        label-active-underline = ${color.primary}
        label-active-padding = 2

        label-occupied = %name%
        label-occupied-padding = 2

        label-urgent = %index%
        label-urgent-background = #f55
        label-urgent-padding = 2

        label-empty = %name%
        label-empty-padding = 2
