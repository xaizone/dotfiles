[color]
       background = ${xrdb:color0:#111}
       foreground = ${xrdb:color7:#eee}
       foreground-alt = ${xrdb:color0:#111}
       primary = ${xrdb:color2:#9ae}

; === [ BARS ] ===

[bar/main]
        width = 100%
        height = 24
        padding = 2

        background = ${color.background}
        foreground = ${color.foreground}

        font-0 = DejaVu Sans Mono:size=9;1

        modules-left = workspace
        modules-center = xwindow
        modules-right = cpu ram volume date time

        fixed-center = true

        scroll-up = "#i3.prev"
        scroll-down = "#i3.next"

        separator = |
        module-margin = 2

        cursor-click = pointer

; === [ MODULES ] === 

[module/xwindow]
        type = internal/xwindow
        format = <label>
        label = %title:0:50:%

[module/date]
        type = internal/date
        date = %Y-%m-%d%
        label = %date%

[module/time]
        type = internal/date
        interval = 1
        time = %H:%M:%S
        label = %time%

[module/volume]
        type = internal/pulseaudio
        interval = 5
        format = <label-volume>
        label-volume = vol: %percentage%%
        label-muted = muted
        click-right = pavucontrol

[module/cpu]
        type = internal/cpu
        interval = 0.5
        format = <label>
        label = cpu: %percentage%%

[module/ram]
        type = internal/memory
        interval = 5
        format = <label>
        label = ram: %percentage_used%%

[module/workspace]
        type = internal/i3
        show-urgent = true
        wrapping-scroll = false

        label-focused = %index%
        label-focused-foreground = ${color.foreground-alt}
        label-focused-background = ${color.primary}
        label-focused-padding = 1

        label-unfocused = %index%
        label-unfocused-padding = 1

        label-urgent = %index%
        label-urgent-background = #f44
        label-urgent-padding = 1
